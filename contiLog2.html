<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BEATS - Conti Log Timetable Worksheet</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:ital,wght@1,900&family=Kanit:ital,wght@1,900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="page-body-layout">
 
    <div class="menu-header-bar">
        <div class="left-nav-group">
            <button class="hamburger-btn" id="openMenuToggle" style="cursor: pointer; background: none; border: none; font-size: 1.5rem;">☰</button>
            <div class="user-greeting">Hi, <span id="displayUsername">User</span></div>
        </div>
        <div style="font-family: 'Kanit', sans-serif; font-weight: 900; color: #dc2b5c; font-size: 1.5rem; font-style: italic;">BEATS</div>
    </div>
 
    <div class="overlay-screen" id="menuOverlay"></div>
    <div class="nav-sidebar" id="sidebarDrawer">
        <div>
            <button class="close-menu-btn" id="closeMenuToggle" style="background: none; border: none; font-size: 1.2rem; cursor: pointer; float: right;">✕</button>
            <div class="sidebar-links" style="margin-top: 40px; display: flex; flex-direction: column; gap: 20px;">
                <a href="dashboard.html" style="text-decoration: none; font-size: 1.1rem;">Dashboard</a>
                <a href="AboutMe.html" style="text-decoration: none; font-size: 1.1rem;">About me</a>
                <a href="SignIn.html" id="logoutActionLink" style="text-decoration: none; font-size: 1.1rem;">Logout</a>
            </div>
        </div>
        <div class="theme-toggle-row" style="margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; border-top: 1px solid #eee; padding-top: 15px;">
            <span style="font-size: 0.95rem; font-weight: 500;">Theme Mode</span>
            <button class="theme-switch-btn" id="themeSwitchTrigger" style="cursor: pointer;">☀️ / 🌙</button>
        </div>
    </div>
 
    <div class="conti-big-box" style="margin-top: 40px; padding-top: 20px;">
        <div style="text-align: center; margin-bottom: 25px;">
            <img src="BINTULUfm.png" alt="BINTULUfm Logo" style="max-height: 50px; width: auto; display: block; margin: 0 auto 10px auto;">
            <div class="conti-title" style="text-align: center; margin: 0;">Conti Logs</div>
        </div>

        <div class="metadata-summary-bar">
            <div>Person on Duty : <span id="lblPerson" class="meta-highlight" style="color: #dc2b5c; font-weight: bold;">--</span></div>
            <div>Date : <span id="lblDate" class="meta-highlight" style="color: #dc2b5c; font-weight: bold;">--</span></div>
            <div>Shift Interval : <span id="lblInterval" class="meta-highlight" style="color: #dc2b5c; font-weight: bold;">--</span></div>
        </div>
 
        <div class="table-responsive-container">
            <table class="conti-table" id="logTable">
                <thead>
                    <tr>
                        <th style="width: 18%;">Time</th>
                        <th style="width: 22%;">Program / Segment Title</th>
                        <th style="width: 10%;">L/R</th>
                        <th style="width: 20%;">Broadcaster</th>
                        <th style="width: 10%;">Netia / CD</th>
                        <th style="width: 15%;">Remarks</th>
                        <th style="width: 15%;">Action</th>
                    </tr>
                </thead>
                <tbody id="tableLogBody"></tbody>
            </table>
        </div>
 
        <div class="bottom-buttons-grid">
            <button class="action-btn-pill btn-cyan-pill" id="btnAddRow">Add New Row</button>
            <div style="display: flex; gap: 12px;">
                <button class="action-btn-pill btn-magenta-pill" id="btnSaveChanges">Save Changes</button>
                <button class="action-btn-pill btn-dark-pill" id="btnPrintLog">Print</button>
            </div>
        </div>
    </div>
 
    <footer>
        <p>© 2026 RTM Bintulu. All rights reserved.</p>
    </footer>
 
    <script type="module">
        import { db, doc, getDoc, setDoc } from "./firebase-config.js";

        const openMenuToggle = document.getElementById('openMenuToggle');
        const closeMenuToggle = document.getElementById('closeMenuToggle');
        const sidebarDrawer = document.getElementById('sidebarDrawer');
        const menuOverlay = document.getElementById('menuOverlay');
        const themeSwitchTrigger = document.getElementById('themeSwitchTrigger');
        const displayUsername = document.getElementById('displayUsername');
 
        const activeUser = sessionStorage.getItem('activeProfileName') || localStorage.getItem('currentUser') || 'User';
        if (displayUsername) displayUsername.textContent = activeUser;

        if(localStorage.getItem('theme') === 'dark') { document.documentElement.setAttribute('data-theme', 'dark'); }
 
        function toggleSidebar(open) {
            sidebarDrawer.classList.toggle('open', open);
            menuOverlay.classList.toggle('show', open);
        }
        openMenuToggle.addEventListener('click', () => toggleSidebar(true));
        closeMenuToggle.addEventListener('click', () => toggleSidebar(false));
        menuOverlay.addEventListener('click', () => toggleSidebar(false));
 
        themeSwitchTrigger.addEventListener('click', () => {
            if(document.documentElement.hasAttribute('data-theme')) {
                document.documentElement.removeAttribute('data-theme');
                localStorage.setItem('theme', 'light');
            } else {
                document.documentElement.setAttribute('data-theme', 'dark');
                localStorage.setItem('theme', 'dark');
            }
        });
 
        const rawPerson = localStorage.getItem('activeConti_Person') || 'DJ A';
        const activeDate = localStorage.getItem('activeConti_Date') || '2026-06-29';
        const activeInterval = localStorage.getItem('activeConti_Interval') || '02:00pm - 08:00pm';
 
        const personNameMapping = { 'DJ A': 'DJ Ruth', 'DJ B': 'DJ Flora', 'DJ C': 'DJ Yon', 'DJ D': 'DJ Zana', 'DJ E': 'DJ Shah' };
        document.getElementById('lblPerson').textContent = personNameMapping[rawPerson] || rawPerson;
        document.getElementById('lblDate').textContent = activeDate;
        document.getElementById('lblInterval').textContent = activeInterval;
 
        const storageKeyPointer = `${rawPerson}_${activeDate}_${activeInterval.replace(/\s+/g, '')}`;
        const tableBody = document.getElementById('tableLogBody');
 
        function generateTimeDropdowns(savedHour='', savedMin='', savedAmpm='') {
            let hHTML = '<select class="row-hour table-dropdown">';
            for(let i=1; i<=12; i++) {
                hHTML += `<option value="${String(i).padStart(2,'0')}" ${String(i).padStart(2,'0')==savedHour?'selected':''}>${String(i).padStart(2,'0')}</option>`;
            }
            hHTML += '</select>';
            let mHTML = '<select class="row-minute table-dropdown">';
            for(let i=0; i<=59; i++) {
                hHTML += `<option value="${String(i).padStart(2,'0')}" ${String(i).padStart(2,'0')==savedMin?'selected':''}>${String(i).padStart(2,'0')}</option>`;
            }
            hHTML += '</select>';
            let apHTML = `<select class="row-ampm table-dropdown"><option value="AM" ${savedAmpm==='AM'?'selected':''}>AM</option><option value="PM" ${savedAmpm==='PM'?'selected':''}>PM</option></select>`;
            return `<div class="row-time-select-container">${hHTML}<span>:</span>${mHTML}${apHTML}</div>`;
        }
 
        window.createLogTableRow = function(dataObj = {}, isSaved = false) {
            const tr = document.createElement('tr');
            tr.innerHTML = `
                <td>${generateTimeDropdowns(dataObj.hour || '09', dataObj.minute || '00', dataObj.ampm || 'AM')}</td>
                <td><div contenteditable="true" class="table-text-editable row-title" style="border:1px solid #ccc; padding:4px;">${dataObj.title || ''}</div></td>
                <td><select class="row-lr"><option value="L" ${dataObj.lr==='L'?'selected':''}>L</option><option value="R" ${dataObj.lr==='R'?'selected':''}>R</option></select></td>
                <td><div contenteditable="true" class="table-text-editable row-producer" style="border:1px solid #ccc; padding:4px;">${dataObj.producer || ''}</div></td>
                <td><select class="row-netia"><option value="">--</option><option value="Netia" ${dataObj.netia==='Netia'?'selected':''}>Netia</option><option value="CD" ${dataObj.netia==='CD'?'selected':''}>CD</option></select></td>
                <td><div contenteditable="true" class="table-text-editable row-remarks" style="border:1px solid #ccc; padding:4px;">${dataObj.remarks || ''}</div></td>
                <td>
                    <button type="button" class="row-btn row-btn-save">Save</button>
                    <button type="button" class="row-btn row-btn-edit" ${!isSaved ? 'disabled' : ''}>Edit</button>
                    <button type="button" class="row-btn row-btn-delete">Delete</button>
                </td>
            `;
            if (isSaved) toggleRowInputState(tr, false);
            tr.querySelector('.row-btn-save').addEventListener('click', (e) => saveIndividualRow(e.target));
            tr.querySelector('.row-btn-edit').addEventListener('click', (e) => editIndividualRow(e.target));
            tr.querySelector('.row-btn-delete').addEventListener('click', (e) => deleteIndividualRow(e.target));
            tableBody.appendChild(tr);
        };
 
        function toggleRowInputState(trRow, enabled) {
            trRow.querySelectorAll('select').forEach(el => el.disabled = !enabled);
            trRow.querySelectorAll('.table-text-editable').forEach(el => el.setAttribute('contenteditable', enabled ? 'true' : 'false'));
            trRow.querySelector('.row-btn-save').disabled = !enabled;
            trRow.querySelector('.row-btn-edit').disabled = enabled;
        }
 
        function saveIndividualRow(buttonElement) {
            const tr = buttonElement.closest('tr');
            if(!tr.querySelector('.row-title').textContent.trim()) { alert('Title is required.'); return; }
            toggleRowInputState(tr, false);
        }
 
        function editIndividualRow(buttonElement) { toggleRowInputState(buttonElement.closest('tr'), true); }
 
        async function deleteIndividualRow(buttonElement) {
            const tr = buttonElement.closest('tr');
            if(confirm("Permanently remove this row?")) {
                tr.remove();
                await saveTablePayload();
            }
        }

        async function saveTablePayload() {
            const savedDatasetPayload = [];
            tableBody.querySelectorAll('tr').forEach(row => {
                savedDatasetPayload.push({
                    hour: row.querySelector('.row-hour').value,
                    minute: row.querySelector('.row-minute').value,
                    ampm: row.querySelector('.row-ampm').value,
                    title: row.querySelector('.row-title').textContent.trim(),
                    lr: row.querySelector('.row-lr').value,
                    producer: row.querySelector('.row-producer').textContent.trim(),
                    netia: row.querySelector('.row-netia').value,
                    remarks: row.querySelector('.row-remarks').textContent.trim()
                });
            });
            await setDoc(doc(db, "beats_conti_sheets", storageKeyPointer), {
                metaPerson: rawPerson, metaDate: activeDate, metaInterval: activeInterval, rows: savedDatasetPayload, updatedAt: Date.now()
            });
        }
 
        async function initialWorkspaceLoader() {
            try {
                const docSnap = await getDoc(doc(db, "beats_conti_sheets", storageKeyPointer));
                if (docSnap.exists()) {
                    const rows = docSnap.data().rows || [];
                    tableBody.innerHTML = '';
                    rows.forEach(item => createLogTableRow(item, true));
                    return;
                }
            } catch(e) { console.error(e); }
            tableBody.innerHTML = ''; createLogTableRow({}, false);
        }
 
        document.getElementById('btnAddRow').addEventListener('click', () => createLogTableRow({}, false));
        document.getElementById('btnSaveChanges').addEventListener('click', async () => {
            await saveTablePayload();
            alert('Conti Sheet logs records saved successfully to cloud repository!');
            initialWorkspaceLoader();
        });
        document.getElementById('btnPrintLog').addEventListener('click', () => window.print());
        window.addEventListener('DOMContentLoaded', initialWorkspaceLoader);
    </script>
</body>
</html>
