<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BEATS - Manage Profiles</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:ital,wght@1,900&family=Plus+Jakarta+Sans:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        .edit-overlay-icon {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.4);
            display: flex; align-items: center; justify-content: center;
        }
        .edit-overlay-icon svg { width: 32px !important; height: 32px !important; fill: #ffffff !important; }
        .btn-delete { background-color: #dc3545; margin-top: 12px; }
        .btn-delete:hover { background-color: #bd2130; }
        .edit-modal-box { display: none; margin-top: 30px; border-top: 2px dashed var(--border-color); padding-top: 25px; width: 100%; }
    </style>
</head>
<body>

    <div class="page-body-layout profile-layout-adjustment">
        <div class="profile-selection-container">
            <h1 class="profile-title">Manage Profiles:</h1>
            <div class="profiles-grid" id="managementGrid"></div>

            <div class="app-container" style="padding:0;">
                <div class="form-box edit-modal-box" id="editorContainer">
                    <h2 id="editingTitle">EDIT PROFILE</h2>
                    <form id="editForm">
                        <input type="hidden" id="editProfileId">
                        <div class="input-group">
                            <label>Change Picture :</label>
                            <input type="file" id="editPhoto" accept="image/*">
                        </div>
                        <div class="input-group">
                            <label for="editName">DJ Name :</label>
                            <input type="text" id="editName" required>
                        </div>
                        <div class="input-group">
                            <label for="editPassword">Change Password (Optional) :</label>
                            <input type="password" id="editPassword" placeholder="Enter new password or leave blank">
                        </div>
                        <button type="submit" class="btn">SAVE CHANGES</button>
                        <button type="button" id="deleteBtn" class="btn btn-delete">DELETE PROFILE</button>
                    </form>
                </div>
            </div>
            <button class="manage-btn" style="background:#ffffff; color:#000000;" onclick="window.location.href='user.html'">Done</button>
        </div>
        <footer>
            <p>© 2026 RTM Bintulu. All rights reserved.</p>
        </footer>
    </div>

    <script type="module">
        import { db, doc, getDoc, setDoc } from "./firebase-config.js";

        const managementGrid = document.getElementById('managementGrid');
        const editorContainer = document.getElementById('editorContainer');
        const editProfileId = document.getElementById('editProfileId');
        const editName = document.getElementById('editName');
        const editPassword = document.getElementById('editPassword');
        const editingTitle = document.getElementById('editingTitle');
        const userEmail = localStorage.getItem('currentUserEmail') || 'guest@beats.com';

        let profiles = [];

        async function loadProfiles() {
            try {
                const docSnap = await getDoc(doc(db, "beats_profiles", userEmail));
                profiles = docSnap.exists() ? docSnap.data().profiles || [] : [];
                renderManagementGrid();
            } catch (err) {
                console.error(err);
            }
        }

        function renderManagementGrid() {
            managementGrid.innerHTML = '';
            if(profiles.length === 0) {
                managementGrid.innerHTML = '<p class="link-gray">No profiles found to manage.</p>';
                return;
            }

            profiles.forEach(profile => {
                const card = document.createElement('div');
                card.className = 'profile-card';
                const imgSource = profile.photo ? profile.photo : `data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="%23535370"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>`;
                
                card.innerHTML = `
                    <div class="avatar-box" style="position:relative;">
                        <img src="${imgSource}" style="width:100%; height:100%; object-fit:cover;">
                        <div class="edit-overlay-icon">
                            <svg viewBox="0 0 24 24"><path d="M3 17.25V21h3.75L17.81 9.94l-3.75-3.75L3 17.25zM20.71 7.04c.39-.39.39-1.02 0-1.41l-2.34-2.34c-.39-.39-1.02-.39-1.41 0l-1.83 1.83 3.75 3.75 1.83-1.83z"/></svg>
                        </div>
                    </div>
                    <span class="profile-name">${profile.name}</span>
                `;
                card.addEventListener('click', () => openEditor(profile));
                managementGrid.appendChild(card);
            });
        }

        function openEditor(profile) {
            editorContainer.style.display = 'block';
            editingTitle.textContent = `EDITING: ${profile.name.toUpperCase()}`;
            editProfileId.value = profile.id;
            editName.value = profile.name;
            editPassword.value = profile.password || '';
        }

        document.getElementById('editForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const targetId = editProfileId.value;
            const idx = profiles.findIndex(p => p.id === targetId);

            if (idx !== -1) {
                profiles[idx].name = editName.value.trim();
                profiles[idx].password = editPassword.value ? editPassword.value : null;

                const file = document.getElementById('editPhoto').files[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onload = async function(event) {
                        profiles[idx].photo = event.target.result;
                        await saveAndReload();
                    };
                    reader.readAsDataURL(file);
                } else {
                    await saveAndReload();
                }
            }
        });

        document.getElementById('deleteBtn').addEventListener('click', async function() {
            const targetId = editProfileId.value;
            const idx = profiles.findIndex(p => p.id === targetId);

            if (idx !== -1 && confirm(`Delete profile permanently?`)) {
                profiles.splice(idx, 1);
                editorContainer.style.display = 'none';
                await saveAndReload();
            }
        });

        async function saveAndReload() {
            await setDoc(doc(db, "beats_profiles", userEmail), { profiles: profiles });
            alert('Profile configuration updated!');
            renderManagementGrid();
        }

        loadProfiles();
    </script>
</body>
</html>
