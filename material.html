<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BEATS - Material Share</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:ital,wght@1,900&family=Kanit:ital,wght@1,900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        /* Shared Dashboard Layout Continuity */
        .search-action-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 15px;
            margin-bottom: 25px;
            flex-wrap: wrap;
        }

        .search-box {
            flex: 1;
            min-width: 260px;
            position: relative;
        }

        .search-box input {
            width: 100%;
            padding: 12px 15px 12px 40px;
            border-radius: 8px;
            border: 1px solid #ddd;
            font-size: 1rem;
            outline: none;
            transition: border-color 0.2s;
        }

        .search-box::before {
            content: "🔍";
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 1.1rem;
            pointer-events: none;
        }

        .action-button-group {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .action-btn {
            color: #fff;
            border: none;
            padding: 12px 20px;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.95rem;
            transition: background 0.2s;
        }

        .add-folder-btn { background-color: #dc2b5c; }
        .add-folder-btn:hover { background-color: #b8204a; }
        .add-file-btn { background-color: #2b8cdc; }
        .add-file-btn:hover { background-color: #1e6ba8; }
        .add-link-btn { background-color: #28a745; }
        .add-link-btn:hover { background-color: #1e7e34; }

        /* Breadcrumb Navigation */
        .breadcrumb-nav {
            margin-bottom: 20px;
            font-size: 0.95rem;
            color: #666;
            display: flex;
            align-items: center;
            gap: 5px;
            flex-wrap: wrap;
        }

        .breadcrumb-item {
            color: #dc2b5c;
            cursor: pointer;
            font-weight: 500;
        }

        .breadcrumb-item:hover {
            text-decoration: underline;
        }

        /* Repository Grid Layout Configuration */
        .folders-directory-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }

        .repository-item-card {
            background: #fff;
            border: 1px solid #e0e0e0;
            border-radius: 12px;
            padding: 20px 15px 15px 15px;
            text-align: center;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            position: relative;
            user-select: none;
            text-decoration: none;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            min-height: 160px;
        }

        .repository-item-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 15px rgba(0,0,0,0.08);
        }

        .card-main-content {
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .item-emoji-icon {
            font-size: 3rem;
            margin-bottom: 10px;
            display: block;
        }

        .item-title-text {
            font-weight: 600;
            color: #333;
            font-size: 1rem;
            word-break: break-word;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            line-height: 1.3;
            margin-bottom: 5px;
            width: 100%;
        }

        /* Card Management Controls Row */
        .card-management-row {
            display: flex;
            justify-content: center;
            gap: 8px;
            margin-top: 10px;
            width: 100%;
            z-index: 30;
        }

        .manage-icon-btn {
            background: #f4f4f6;
            border: none;
            border-radius: 6px;
            width: 32px;
            height: 32px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.9rem;
            transition: background 0.2s, transform 0.1s;
        }

        .manage-icon-btn:hover {
            transform: scale(1.05);
        }

        .btn-edit:hover { background-color: #ffeeba; }
        .btn-delete:hover { background-color: #f8d7da; }

        .empty-state-notice {
            grid-column: 1 / -1;
            text-align: center;
            padding: 40px;
            color: #888;
            font-style: italic;
        }

        /* Dark mode compatibility fixes */
        [data-theme="dark"] .repository-item-card {
            background: #252525;
            border-color: #3a3a3a;
        }
        [data-theme="dark"] .item-title-text {
            color: #f0f0f0;
        }
        [data-theme="dark"] .search-box input {
            background: #252525;
            border-color: #3a3a3a;
            color: #fff;
        }
        [data-theme="dark"] .breadcrumb-nav {
            color: #aaa;
        }
        [data-theme="dark"] .manage-icon-btn {
            background: #333;
        }
        [data-theme="dark"] .btn-edit:hover { background-color: #534105; }
        [data-theme="dark"] .btn-delete:hover { background-color: #58151c; }
    </style>
</head>
<body class="dashboard-body">

    <div class="menu-header-bar">
        <div class="left-nav-group">
            <button class="hamburger-btn" id="openMenuToggle" aria-label="Open Menu">☰</button>
            <div class="user-greeting">Hi, <span id="displayUsername">Guest</span></div>
        </div>
        <div style="font-family: 'Kanit', sans-serif; font-weight: 900; color: #dc2b5c; font-size: 1.5rem; font-style: italic; cursor: pointer;" onclick="window.location.href='dashboard.html'">BEATS</div>
    </div>

    <div class="overlay-screen" id="menuOverlay"></div>
    
    <div class="nav-sidebar" id="sidebarDrawer">
        <button class="close-menu-btn" id="closeMenuToggle" aria-label="Close Menu">✕</button>
        <div class="sidebar-links">
            <a href="dashboard.html">Dashboard</a>
            <a href="aboutMe.html">About Me</a>
            <a href="SignIn.html" id="logoutActionLink" style="color: #ff4d4d; margin-top: 20px;">Logout</a>
        </div>
        
        <div class="theme-toggle-row">
            <span>Theme Mode</span>
            <button class="theme-switch-btn" id="themeSwitchTrigger">☀️ / 🌙</button>
        </div>
    </div>

    <main class="page-body-layout" style="position: relative; z-index: 10;">
        <div class="dashboard-view-wrapper">
            
            <h2 class="core-functions-headline" style="margin-bottom: 10px;">Shared Materials</h2>
            
            <div class="breadcrumb-nav" id="directoryBreadcrumbs"></div>

            <div class="search-action-bar">
                <div class="search-box">
                    <input type="text" id="directorySearchInput" placeholder="Search folders, documents, images or links...">
                </div>
                <div class="action-button-group">
                    <button class="action-btn add-folder-btn" id="triggerAddFolderAction">
                        <span>📁</span> + Folder
                    </button>
                    <button class="action-btn add-file-btn" id="triggerAddFileAction">
                        <span>📄</span> + File
                    </button>
                    <button class="action-btn add-link-btn" id="triggerAddLinkAction">
                        <span>🔗</span> + Link
                    </button>
                </div>
            </div>

            <input type="file" id="hiddenFileUploaderNode" accept=".pdf,.doc,.docx,image/*" style="display: none;">

            <div class="folders-directory-grid" id="directoryGridDisplay"></div>

            <footer>
                <p>© 2026 RTM Bintulu. All rights reserved.</p>
            </footer>
        </div>
    </main>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const openMenuToggle = document.getElementById('openMenuToggle');
            const closeMenuToggle = document.getElementById('closeMenuToggle');
            const sidebarDrawer = document.getElementById('sidebarDrawer');
            const menuOverlay = document.getElementById('menuOverlay');
            const themeSwitchTrigger = document.getElementById('themeSwitchTrigger');
            const displayUsername = document.getElementById('displayUsername');

            const activeUser = sessionStorage.getItem('activeProfileName') || localStorage.getItem('currentUser') || 'Guest';
            if (displayUsername) displayUsername.textContent = activeUser;

            if(localStorage.getItem('theme') === 'dark') {
                document.documentElement.setAttribute('data-theme', 'dark');
            }

            function toggleSidebar(open) {
                if (!sidebarDrawer || !menuOverlay) return;
                if(open) {
                    sidebarDrawer.classList.add('open');
                    menuOverlay.classList.add('show');
                } else {
                    sidebarDrawer.classList.remove('open');
                    menuOverlay.classList.remove('show');
                }
            }

            if (openMenuToggle) openMenuToggle.addEventListener('click', () => toggleSidebar(true));
            if (closeMenuToggle) closeMenuToggle.addEventListener('click', () => toggleSidebar(false));
            if (menuOverlay) menuOverlay.addEventListener('click', () => toggleSidebar(false));

            if (themeSwitchTrigger) {
                themeSwitchTrigger.addEventListener('click', () => {
                    if(document.documentElement.hasAttribute('data-theme')) {
                        document.documentElement.removeAttribute('data-theme');
                        localStorage.setItem('theme', 'light');
                    } else {
                        document.documentElement.setAttribute('data-theme', 'dark');
                        localStorage.setItem('theme', 'dark');
                    }
                });
            }
        });
    </script>

    <script>
        let currentFolderId = "root"; 
        let currentPath = [{ id: "root", name: "All Folders" }];

        const directoryGridDisplay = document.getElementById('directoryGridDisplay');
        const triggerAddFolderAction = document.getElementById('triggerAddFolderAction');
        const triggerAddFileAction = document.getElementById('triggerAddFileAction');
        const triggerAddLinkAction = document.getElementById('triggerAddLinkAction');
        const hiddenFileUploaderNode = document.getElementById('hiddenFileUploaderNode');
        const directoryBreadcrumbs = document.getElementById('directoryBreadcrumbs');
        const directorySearchInput = document.getElementById('directorySearchInput');

        function getStoragePool() {
            const pool = localStorage.getItem('beats_materials_folders_v1');
            return pool ? JSON.parse(pool) : [];
        }

        function saveStoragePool(pool) {
            try {
                localStorage.setItem('beats_materials_folders_v1', JSON.stringify(pool));
                renderDirectoryView();
            } catch (error) {
                alert("Storage full! Try deleting some old materials or uploading a slightly smaller file.");
            }
        }

        function getActiveUserString() {
            return sessionStorage.getItem('activeProfileName') || localStorage.getItem('currentUser') || 'Guest';
        }

        // Action Trigger: Create Folder
        triggerAddFolderAction.addEventListener('click', () => {
            const currentUsername = getActiveUserString();
            const folderName = prompt("Enter new folder name (Make sure it includes your name):", currentUsername);
            if (!folderName || folderName.trim() === "") return;

            const pool = getStoragePool();
            pool.push({
                id: "folder_" + Date.now(),
                parentId: currentFolderId,
                type: "directory",
                name: folderName.trim(),
                createdBy: currentUsername,
                timestamp: Date.now()
            });
            saveStoragePool(pool);
        });

        // Action Trigger: Trigger File Selection UI Workflow
        triggerAddFileAction.addEventListener('click', () => {
            hiddenFileUploaderNode.click();
        });

        // Handle File Processing Events
        hiddenFileUploaderNode.addEventListener('change', (e) => {
            const uploadedFile = e.target.files[0];
            if (!uploadedFile) return;

            // Strict byte calculation comparison conversion fix
            const fileSizeInMB = uploadedFile.size / (1024 * 1024);
            if (fileSizeInMB > 4.5) {
                alert("File size limit warning! Please choose a file under 4.5MB to prevent storage system drops. Your file is: " + fileSizeInMB.toFixed(2) + "MB");
                hiddenFileUploaderNode.value = "";
                return;
            }

            const fileReader = new FileReader();
            fileReader.onload = function(event) {
                const pool = getStoragePool();
                let fileEmoji = "📄";
                
                if (uploadedFile.type.startsWith('image/')) fileEmoji = "🖼️";
                else if (uploadedFile.name.endsWith('.pdf')) fileEmoji = "📕";
                else if (uploadedFile.name.endsWith('.doc') || uploadedFile.name.endsWith('.docx')) fileEmoji = "📘";

                pool.push({
                    id: "file_" + Date.now(),
                    parentId: currentFolderId,
                    type: "file",
                    name: uploadedFile.name,
                    payloadData: event.target.result,
                    mimeType: uploadedFile.type,
                    emoji: fileEmoji,
                    createdBy: getActiveUserString(),
                    timestamp: Date.now()
                });
                saveStoragePool(pool);
                hiddenFileUploaderNode.value = "";
            };
            fileReader.readAsDataURL(uploadedFile);
        });

        // Action Trigger: Create External Dynamic URL Hyperlink Element Node
        triggerAddLinkAction.addEventListener('click', () => {
            const label = prompt("Enter link title / description:");
            if (!label || label.trim() === "") return;
            
            let address = prompt("Paste or type target URL string destination (e.g. https://example.com):");
            if (!address || address.trim() === "") return;

            if (!/^https?:\/\//i.test(address)) {
                address = "https://" + address;
            }

            const pool = getStoragePool();
            pool.push({
                id: "link_" + Date.now(),
                parentId: currentFolderId,
                type: "hyperlink",
                name: label.trim(),
                targetUrl: address.trim(),
                createdBy: getActiveUserString(),
                timestamp: Date.now()
            });
            saveStoragePool(pool);
        });

        directorySearchInput.addEventListener('input', () => {
            renderDirectoryView();
        });

        // Dynamic Interface Render Engine
        function renderDirectoryView() {
            directoryGridDisplay.innerHTML = "";
            const pool = getStoragePool();
            const searchKeyword = directorySearchInput.value.trim().toLowerCase();
            const activeUser = getActiveUserString();

            let targetedItems = [];
            if (searchKeyword !== "") {
                targetedItems = pool.filter(item => item.name.toLowerCase().includes(searchKeyword));
            } else {
                targetedItems = pool.filter(item => item.parentId === currentFolderId);
            }

            // Organizes repository contents by date
            targetedItems.sort((a, b) => {
                const isDirA = a.type === "directory" || !a.type;
                const isDirB = b.type === "directory" || !b.type;
                
                if (isDirA && !isDirB) return -1;
                if (!isDirA && isDirB) return 1;
                
                return (b.timestamp || 0) - (a.timestamp || 0);
            });

            if (targetedItems.length === 0) {
                directoryGridDisplay.innerHTML = `<div class="empty-state-notice">No materials found in this section. Add folders, files, or links above.</div>`;
                renderBreadcrumbs();
                return;
            }

            targetedItems.forEach(item => {
                const isDirectory = item.type === "directory" || !item.type; 
                
                const card = document.createElement('div');
                card.className = "repository-item-card";

                let displayEmoji = "📁";
                if (item.type === "file") displayEmoji = item.emoji || "📄";
                if (item.type === "hyperlink") displayEmoji = "🔗";

                const uploadDate = item.timestamp ? new Date(item.timestamp).toLocaleDateString('en-GB', {
                    day: '2-digit',
                    month: 'short',
                    year: 'numeric'
                }) : 'Unknown Date';

                const isOwner = item.createdBy === activeUser;

                card.innerHTML = `
                    <div class="card-main-content">
                        <span class="item-emoji-icon">${displayEmoji}</span>
                        <div class="item-title-text" title="${item.name}">${item.name}</div>
                        <small style="font-size:0.75rem; color:#888; display:block; margin-top:2px;">By: ${item.createdBy}</small>
                        <small style="font-size:0.70rem; color:#aaa; display:block; margin-top:1px;">📅 ${uploadDate}</small>
                    </div>
                    <div class="card-management-row">
                        <button class="manage-icon-btn btn-edit" title="Edit Item name" ${!isOwner ? 'style="opacity: 0.4; cursor: not-allowed;"' : ''}>✏️</button>
                        <button class="manage-icon-btn btn-delete" title="Delete Item" ${!isOwner ? 'style="opacity: 0.4; cursor: not-allowed;"' : ''}>🗑️</button>
                    </div>
                `;
                
                card.querySelector('.card-main-content').addEventListener('click', (e) => {
                    if (isDirectory) {
                        if (searchKeyword !== "") {
                            rebuildPathHistory(item.id);
                            directorySearchInput.value = ""; 
                        } else {
                            currentPath.push({ id: item.id, name: item.name });
                            currentFolderId = item.id;
                        }
                        renderDirectoryView();
                    } else if (item.type === "file") {
                        openFileBlobWindow(item);
                    } else if (item.type === "hyperlink") {
                        window.open(item.targetUrl, '_blank');
                    }
                });

                card.querySelector('.btn-edit').addEventListener('click', (e) => {
                    e.stopPropagation();
                    if (!isOwner) {
                        alert("Access Denied: You cannot modify elements uploaded by other users.");
                        return;
                    }

                    const newName = prompt(`Edit name for "${item.name}":`, item.name);
                    if (!newName || newName.trim() === "") return;
                    
                    const poolData = getStoragePool();
                    const indexTarget = poolData.findIndex(f => f.id === item.id);
                    if (indexTarget > -1) {
                        poolData[indexTarget].name = newName.trim();
                        
                        if (item.type === "hyperlink") {
                            let newUrl = prompt("Edit link destination address:", item.targetUrl);
                            if (newUrl && newUrl.trim() !== "") {
                                if (!/^https?:\/\//i.test(newUrl)) newUrl = "https://" + newUrl;
                                poolData[indexTarget].targetUrl = newUrl.trim();
                            }
                        }
                        saveStoragePool(poolData);
                    }
                });

                card.querySelector('.btn-delete').addEventListener('click', (e) => {
                    e.stopPropagation();
                    if (!isOwner) {
                        alert("Access Denied: You do not have permission to delete items uploaded by other users.");
                        return;
                    }

                    let confirmText = `Are you sure you want to delete "${item.name}"?`;
                    if (isDirectory) confirmText += " This will also delete any contents inside it.";
                    
                    if (!confirm(confirmText)) return;

                    let poolData = getStoragePool();
                    if (isDirectory) {
                        let idsToDelete = [item.id];
                        let processingQueue = [item.id];

                        while(processingQueue.length > 0) {
                            const currentParent = processingQueue.shift();
                            const children = poolData.filter(f => f.parentId === currentParent);
                            children.forEach(child => {
                                idsToDelete.push(child.id);
                                processingQueue.push(child.id);
                            });
                        }
                        poolData = poolData.filter(f => !idsToDelete.includes(f.id));
                    } else {
                        poolData = poolData.filter(f => f.id !== item.id);
                    }
                    saveStoragePool(poolData);
                });

                directoryGridDisplay.appendChild(card);
            });

            renderBreadcrumbs();
        }

        function openFileBlobWindow(item) {
            const rawData = item.payloadData;
            if(!rawData) return;
            
            const targetWindow = window.open();
            if(!targetWindow) {
                alert("Please disable popup blockers to view files.");
                return;
            }
            
            if(item.mimeType && item.mimeType.startsWith('image/')) {
                targetWindow.document.write(`<title>${item.name}</title><body style="margin:0; display:flex; justify-content:center; align-items:center; background:#1a1a1a;"><img src="${rawData}" style="max-width:100%; max-height:100vh;"></body>`);
            } else {
                targetWindow.document.write(`<title>${item.name}</title><body style="font-family:sans-serif; text-align:center; padding-top:50px;"><h2>${item.name}</h2><p>Click below to download or view your asset:</p><a href="${rawData}" download="${item.name}" style="display:inline-block; padding:12px 24px; background:#dc2b5c; color:#fff; text-decoration:none; border-radius:5px; font-weight:bold;">Download Asset File</a></body>`);
            }
        }

        function renderBreadcrumbs() {
            directoryBreadcrumbs.innerHTML = "";
            currentPath.forEach((node, index) => {
                const isLast = index === currentPath.length - 1;
                const span = document.createElement('span');
                
                if (isLast) {
                    span.textContent = node.name;
                    span.style.fontWeight = "bold";
                } else {
                    span.className = "breadcrumb-item";
                    span.textContent = node.name;
                    span.addEventListener('click', () => {
                        currentPath = currentPath.slice(0, index + 1);
                        currentFolderId = node.id;
                        directorySearchInput.value = "";
                        renderDirectoryView();
                    });
                }
                directoryBreadcrumbs.appendChild(span);

                if (!isLast) {
                    const divider = document.createElement('span');
                    divider.textContent = " / ";
                    directoryBreadcrumbs.appendChild(divider);
                }
            });
        }

        function rebuildPathHistory(folderId) {
            const pool = getStoragePool();
            let pathTrace = [];
            let current = pool.find(f => f.id === folderId);

            while (current) {
                pathTrace.unshift({ id: current.id, name: current.name });
                current = pool.find(f => f.id === current.parentId);
            }

            currentPath = [{ id: "root", name: "All Folders" }, ...pathTrace];
            currentFolderId = folderId;
        }

        renderDirectoryView();
    </script>
</body>
</html>
