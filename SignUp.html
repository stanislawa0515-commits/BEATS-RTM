<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BEATS - Sign Up</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:ital,wght@1,900&family=Kanit:ital,wght@1,900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="app-container">
        <h1 class="brand-header pulse-word">BEATS</h1>

        <div class="form-box">
            <h2>Sign Up</h2>
            <form id="signUpForm">
                <div class="input-group">
                    <label for="email">Email :</label>
                    <input type="email" id="email" placeholder="example@email.com" required>
                </div>

                <div class="input-group">
                    <label for="password">Password :</label>
                    <input type="password" id="password" placeholder="Create a strong password" required>
                </div>

                <div class="input-group">
                    <label for="confirmPassword">Confirm Password :</label>
                    <input type="password" id="confirmPassword" placeholder="Repeat your password" required>
                </div>

                <button type="submit" class="btn">Sign Up</button>
            </form>
            
            <div class="form-links">
                <a href="SignIn.html" class="link-gray">Already have an account? Sign In</a>
            </div>
        </div>

        <footer>
            <p>© 2026 RTM Bintulu. All rights reserved.</p>
        </footer>
    </div>

    <script>
        if (localStorage.getItem('beats-theme') === 'light') {
            document.documentElement.setAttribute('data-theme', 'light');
        }

        document.getElementById('signUpForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const email = document.getElementById('email').value.trim().toLowerCase();
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;

            if (password !== confirmPassword) {
                alert('Passwords do not match! Please check your input.');
                return;
            }

            if (email === 'admin@beats.com' || email === 'test@example.com') {
                alert('This email profile registration is reserved by system architectures.');
                return;
            }

            // Verify if profile already documented in Local Registry
            let localUsers = JSON.parse(localStorage.getItem('beats_users')) || {};

            if (localUsers[email]) {
                alert('This email is already registered to an account.');
                return;
            }

            // Create account inside local storage records
            localUsers[email] = {
                email: email,
                password: password,
                createdAt: Date.now()
            };

            localStorage.setItem('beats_users', JSON.stringify(localUsers));

            alert('Registration complete! You can now Sign In.');
            window.location.href = 'SignIn.html';
        });
    </script>
</body>
</html>
